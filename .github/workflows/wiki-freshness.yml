name: Wiki Freshness Check

on:
  schedule:
    - cron: "30 3 * * 1" # Monday 03:30 UTC
  workflow_dispatch:
    inputs:
      enforcement_mode:
        description: "Whether freshness failures block the run (signal=advisory, blocking=hard-fail)"
        type: choice
        options:
          - signal
          - blocking
        default: signal

permissions:
  contents: read

concurrency:
  group: kb-freshness-${{ github.repository }}
  cancel-in-progress: true

jobs:
  wiki-freshness:
    name: Wiki freshness analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ENFORCEMENT_MODE: ${{ inputs.enforcement_mode || 'signal' }}
    steps:
      - name: Checkout repository snapshot
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Run wiki freshness check
        id: freshness
        continue-on-error: true
        run: |
          set -euo pipefail
          mkdir -p freshness-reports
          python3 scripts/validation/check_doc_freshness.py \
            --scope wiki \
            --as-of "$(date -u +%Y-%m-%d)" \
            --max-age-days 90 \
            --failures-only \
            > freshness-reports/wiki-freshness.json 2>&1
          freshness_exit=$?
          echo "exit_code=${freshness_exit}" >> "${GITHUB_OUTPUT}"
          exit "${freshness_exit}"

      - name: Annotate stale pages
        if: always()
        run: |
          set -euo pipefail
          if [[ ! -f freshness-reports/wiki-freshness.json ]]; then
            echo "No freshness report generated."
            exit 0
          fi
          python3 - <<'EOF'
          import json, sys
          with open("freshness-reports/wiki-freshness.json") as f:
              report = json.load(f)
          files = report.get("files", [])
          if not files:
              print("All wiki pages are within the freshness threshold.")
              sys.exit(0)
          for entry in files:
              path = entry.get("path", "unknown")
              msg = entry.get("message", "stale document")
              print(f"::warning file={path}::{msg} FIX: update page content and set updated_at to today's date in the YAML frontmatter.")
          EOF

      - name: Classify stale pages for routing
        if: always()
        run: |
          set -euo pipefail
          if [[ ! -f freshness-reports/wiki-freshness.json ]]; then
            echo '{"stale_pages":[]}' > freshness-reports/freshness-routing.json
            exit 0
          fi
          python3 - <<'CLASSIFY_EOF'
          import json
          with open("freshness-reports/wiki-freshness.json") as f:
              report = json.load(f)
          files = report.get("files", [])
          classified = []
          for entry in files:
              path = entry.get("path", "")
              days = entry.get("days_stale", 999)  # missing data → HITL (deny-by-default)
              # Advisory classification only — this artifact has no downstream
              # consumer yet and does not gate any write path.  The output is
              # "afk-candidate" (not "afk") because age alone is insufficient
              # to confirm AFK eligibility per ADR-014 §4; a downstream step
              # must verify no open questions, patrol findings, or source
              # staleness before the classification becomes operative.
              classification = "afk-candidate" if days < 180 else "hitl"
              action = ("verify AFK eligibility then update freshness_date metadata"
                        if classification == "afk-candidate"
                        else "review content for accuracy and re-source if needed")
              classified.append({
                  "path": path,
                  "last_updated": entry.get("last_updated", ""),
                  "days_stale": days,
                  "classification": classification,
                  "recommended_action": action,
              })
          afk_count = sum(1 for p in classified if p["classification"] == "afk-candidate")
          with open("freshness-reports/freshness-routing.json", "w") as f:
              json.dump({"stale_pages": classified}, f, indent=2)
          print(f"Classified {len(classified)} stale pages: {afk_count} AFK-candidate, {len(classified) - afk_count} HITL")
          CLASSIFY_EOF

      - name: Advisory governance signal sweep
        continue-on-error: true  # advisory; crashes must not fail the scheduled run
        run: |
          set -euo pipefail
          mkdir -p freshness-reports
          python3 .github/skills/validate-wiki-governance/logic/validate_wiki_governance.py \
            --mode signal \
            --quiet \
            --validator sourceref-shape \
            --validator page-template \
            --validator append-only-log \
            --validator topology-hygiene \
            --validator freshness-threshold \
            > freshness-reports/governance-signal.json
          python3 - <<'EOF'
          import json, sys
          with open("freshness-reports/governance-signal.json") as f:
              report = json.load(f)
          findings = report.get("findings", [])
          fail_findings = [fn for fn in findings if fn.get("status") == "fail"]
          if not fail_findings:
              print("Governance signal sweep: no advisory findings.")
              sys.exit(0)
          for fn in fail_findings:
              target = fn.get("target", "wiki")
              msg = fn.get("message", "governance finding")
              validator = fn.get("validator", "governance")
              print(f"::warning file={target}::[{validator}] {msg} (advisory — signal mode)")
          EOF

      - name: Upload freshness report artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: wiki-freshness-${{ github.run_id }}
          path: freshness-reports/
          if-no-files-found: warn
          retention-days: 30

      - name: Fail on stale wiki pages (blocking mode only)
        if: env.ENFORCEMENT_MODE == 'blocking' && steps.freshness.outcome == 'failure'
        run: |
          set -euo pipefail
          echo "::error::Wiki freshness check failed in blocking mode. Review the uploaded freshness report artifact." >&2
          exit 1
