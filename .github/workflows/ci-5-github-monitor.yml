name: CI-5 GitHub Source Monitor

on:
  schedule:
    # Run daily at 06:00 UTC.
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      registry_path:
        description: |
          Optional: path to a single registry file
          (e.g. raw/github-sources/org-repo.source-registry.json).
          Omit to check all registries.
        required: false
        type: string

# Workflow-level permissions are read-only.
# The write-capable jobs override at job level.
permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  check-drift:
    name: CI-5 drift detection
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      drift_detected: ${{ steps.detect.outputs.drift_detected }}
      artifact_name: ${{ steps.detect.outputs.artifact_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GITHUB_APP_ID }}
          private-key: ${{ secrets.GITHUB_APP_PRIVATE_KEY }}

      - name: Mask GitHub App token
        run: echo "::add-mask::${{ steps.app-token.outputs.token }}"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e . --quiet

      - name: Check drift across all registries
        id: detect
        env:
          GITHUB_APP_TOKEN: ${{ steps.app-token.outputs.token }}
          # SECURITY: pass workflow_dispatch input as env var, never interpolate
          # ${{ inputs.* }} directly into a run: shell block (shell injection risk).
          REGISTRY_PATH: ${{ inputs.registry_path }}
        run: |
          set -euo pipefail

          REGISTRY_ARGS=()
          if [ -n "${REGISTRY_PATH}" ]; then
            REGISTRY_ARGS=(--registry "${REGISTRY_PATH}")
          fi

          # Run drift detection; exits 0 on success (even when drift is found),
          # exits 1 on API errors or configuration errors.
          python -m scripts.github_monitor.check_drift \
            "${REGISTRY_ARGS[@]}" \
            --output drift-report.json

          # Parse has_drift from the report to set the job output.
          HAS_DRIFT=$(python -c "
          import json, sys
          with open('drift-report.json') as f:
              d = json.load(f)
          print('true' if d.get('has_drift') else 'false')
          ")
          ARTIFACT_NAME="drift-report-${{ github.run_id }}"

          echo "drift_detected=${HAS_DRIFT}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"
          echo "Drift detected: ${HAS_DRIFT}"

      - name: Upload drift report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.detect.outputs.artifact_name || format('drift-report-{0}', github.run_id) }}
          path: drift-report.json
          retention-days: 7

  fetch-and-update:
    name: CI-5 fetch + registry update
    needs: check-drift
    if: needs.check-drift.outputs.drift_detected == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Protected environment gate — requires the same approval as CI-3.
    environment: protected-pr-write
    concurrency:
      group: kb-write-${{ github.repository }}
      cancel-in-progress: false
    permissions:
      contents: write
    env:
      WRITE_ALLOWLIST: raw/assets/**,raw/github-sources/**
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      # Regenerate token close to use to avoid 55-minute expiry on long jobs.
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GITHUB_APP_ID }}
          private-key: ${{ secrets.GITHUB_APP_PRIVATE_KEY }}

      - name: Mask GitHub App token
        run: echo "::add-mask::${{ steps.app-token.outputs.token }}"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e . --quiet

      - name: Download drift report
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.check-drift.outputs.artifact_name }}

      - name: Fetch assets and update registry
        env:
          GITHUB_APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          python -m scripts.github_monitor.fetch_content \
            --drift-report drift-report.json \
            --approval approved

  classify-drift:
    name: CI-5 HITL/AFK classification
    needs: [check-drift, fetch-and-update]
    if: needs.fetch-and-update.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
    outputs:
      has_afk: ${{ steps.classify.outputs.has_afk }}
      has_hitl: ${{ steps.classify.outputs.has_hitl }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download drift report
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.check-drift.outputs.artifact_name }}

      - name: Classify drift entries as HITL or AFK
        id: classify
        run: |
          set -euo pipefail
          python3 - <<'CLASSIFY_EOF'
          import json, os

          with open("drift-report.json") as f:
              report = json.load(f)

          drifted = [e for e in report.get("entries", []) if e.get("has_drift", False)]

          # Deny-by-default (ADR-014): all drifted entries classify as HITL.
          # TODO: When check_drift.py adds line-level diff metrics
          # (lines_added, lines_removed, structural_change), add threshold
          # logic here to allow small, non-structural drifts as AFK.
          afk_entries = []
          hitl_entries = list(drifted)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"has_afk={'true' if afk_entries else 'false'}\n")
              f.write(f"has_hitl={'true' if hitl_entries else 'false'}\n")

          with open("afk-entries.json", "w") as f:
              json.dump({"entries": afk_entries}, f, indent=2)
          with open("hitl-entries.json", "w") as f:
              json.dump({"entries": hitl_entries}, f, indent=2)

          print(f"Classification: {len(afk_entries)} AFK, {len(hitl_entries)} HITL")
          CLASSIFY_EOF

      - name: Upload classification artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drift-classification-${{ github.run_id }}
          path: |
            afk-entries.json
            hitl-entries.json
          retention-days: 7

      - name: Create GitHub Issues for HITL entries
        if: steps.classify.outputs.has_hitl == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 - <<'ISSUE_EOF'
          import json, os, subprocess, sys

          with open("hitl-entries.json") as f:
              hitl = json.load(f)

          run_id = os.environ.get("GITHUB_RUN_ID", "unknown")

          for entry in hitl.get("entries", []):
              registry = entry.get("registry_path", "unknown")
              source_key = entry.get("path", "unknown")
              dedupe_key = f"ci5-drift:{registry}:{source_key}"
              title = f"[CI-5 HITL] Drift detected: {source_key}"

              result = subprocess.run(
                  ["gh", "issue", "list", "--search", f'"{dedupe_key}" in:body', "--json", "number", "--limit", "1"],
                  capture_output=True, text=True
              )
              existing = []
              if result.returncode == 0:
                  try:
                      existing = json.loads(result.stdout)
                  except json.JSONDecodeError:
                      print(f"::warning::Dedupe search returned unparseable JSON for {source_key}; creating issue anyway.", flush=True)
              else:
                  print(f"::warning::Dedupe search failed for {source_key}; creating issue anyway. stderr: {result.stderr}", flush=True)

              if existing:
                  issue_num = existing[0]["number"]
                  comment_result = subprocess.run(
                      ["gh", "issue", "comment", str(issue_num), "--body",
                       f"Updated drift detected in run {run_id}."],
                      capture_output=True, text=True
                  )
                  if comment_result.returncode != 0:
                      print(f"::warning::Failed to comment on issue #{issue_num} for {source_key}: {comment_result.stderr}", flush=True)
                  else:
                      print(f"Updated existing issue #{issue_num} for {source_key}")
              else:
                  body = f"""## CI-5 HITL Drift Alert

          **Registry:** `{registry}`
          **Source:** `{source_key}`
          **Classification:** HITL (requires human review per ADR-014)

          ### Recommended action
          1. Review the fetched asset in `raw/assets/`
          2. Assess whether the wiki page update requires editorial judgment
          3. Run `synthesize_diff.py` manually after review

          ---
          _Dedupe key: `{dedupe_key}`_
          _Auto-generated by CI-5 GitHub Source Monitor (run {run_id})_
          """
                  create_result = subprocess.run(
                      ["gh", "issue", "create", "--title", title, "--body", body, "--label", "wiki-change,hitl"],
                      capture_output=True, text=True
                  )
                  if create_result.returncode != 0:
                      print(f"::error::Failed to create HITL issue for {source_key}: {create_result.stderr}", flush=True)
                      sys.exit(1)
                  else:
                      print(f"Created new HITL issue for {source_key}")
          ISSUE_EOF

  synthesize:
    name: CI-5 synthesize + open PR
    needs: [check-drift, fetch-and-update, classify-drift]
    # Only run AFK-classified drifts automatically; HITL drifts create Issues instead.
    if: needs.classify-drift.outputs.has_afk == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: protected-pr-write
    concurrency:
      group: kb-write-${{ github.repository }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
    env:
      WRITE_ALLOWLIST: raw/assets/**,raw/github-sources/**,wiki/**
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e . --quiet

      - name: Download drift report
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.check-drift.outputs.artifact_name }}

      - name: Apply diff-aware wiki updates
        run: |
          set -euo pipefail
          python -m scripts.github_monitor.synthesize_diff \
            --drift-report drift-report.json \
            --approval approved

      - name: Commit and open PR
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          BRANCH="github-monitor/sync-${{ github.run_id }}"
          git checkout -b "${BRANCH}"

          # Stage only the allowlisted paths.
          git add raw/assets/ raw/github-sources/ wiki/
          git diff --cached --quiet && echo "Nothing to commit" && exit 0

          git commit -m "chore(github-monitor): sync monitored source(s) [run ${{ github.run_id }}]"

          git push origin "HEAD:${BRANCH}"

          gh pr create \
            --title "chore(github-monitor): sync monitored source(s)" \
            --body "Automated diff-aware sync by CI-5 GitHub source monitor (run ${{ github.run_id }})." \
            --base main \
            --head "${BRANCH}"
