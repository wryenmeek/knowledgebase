name: CI-2 Analyst Read-Only Diagnostics

on:
  pull_request:
  workflow_dispatch:
  push:
    branches-ignore:
      - "ci3/**"
      - "ci4/**"

permissions:
  actions: read
  checks: read
  contents: read

concurrency:
  group: kb-readonly-ci2-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyst-diagnostics:
    name: CI-2 diagnostics (tp-analyst-readonly)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI_ID: CI-2
      TOKEN_PROFILE: tp-analyst-readonly
    steps:
      - name: Checkout repository snapshot (read-only token)
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py3.12-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-py3.12-

      - name: Dependency vulnerability audit (pip-audit)
        run: |
          set -euo pipefail
          pip install --quiet pip-audit
          pip-audit --desc on

      - name: Bootstrap repo-local qmd preflight shim
        run: |
          set -euo pipefail
          mkdir -p .ci-bin .qmd/index
          cat > .ci-bin/qmd <<'EOF'
          #!/usr/bin/env sh
          set -eu
          exit 0
          EOF
          chmod +x .ci-bin/qmd
          printf '%s\n' "${PWD}/.ci-bin" >> "${GITHUB_PATH}"

      - name: Validate workflow YAML syntax
        run: |
          set -euo pipefail
          ruby -e '
            require "psych"

            Dir.glob(".github/workflows/*.yml").sort.each do |workflow_path|
              begin
                Psych.parse_file(workflow_path)
              rescue Psych::SyntaxError => err
                warn "::error file=#{workflow_path}::#{err.message}"
                exit 1
              end
            end
          '

      - name: Assert CI-2 read-only profile context
        run: |
          set -euo pipefail
          test "${CI_ID}" = "CI-2"
          test "${TOKEN_PROFILE}" = "tp-analyst-readonly"
          mkdir -p diagnostics
          {
            echo "ci_id=${CI_ID}"
            echo "token_profile=${TOKEN_PROFILE}"
            echo "permission_contract=actions:read,checks:read,contents:read"
            echo "event=${GITHUB_EVENT_NAME}"
            echo "sha=${GITHUB_SHA}"
          } | tee diagnostics/context.log

      - name: Run analyst diagnostics (lint + unit tests)
        id: diagnostics
        continue-on-error: true
        run: |
          set -uo pipefail
          mkdir -p diagnostics
          : > diagnostics/diagnostics.log

          echo "[CI-2] validate_wiki_governance wrapper" | tee -a diagnostics/diagnostics.log
          python3 .github/skills/validate-wiki-governance/logic/validate_wiki_governance.py --quiet 2>&1 | tee -a diagnostics/diagnostics.log
          wrapper_exit="${PIPESTATUS[0]}"

          echo "[CI-2] check_doc_freshness --scope wiki" | tee -a diagnostics/diagnostics.log
          python3 scripts/validation/check_doc_freshness.py --scope wiki --as-of "$(date -u +%Y-%m-%d)" --max-age-days 90 --failures-only 2>&1 | tee -a diagnostics/diagnostics.log
          freshness_exit="${PIPESTATUS[0]}"

          echo "[CI-2] content_quality_report --mode summary" | tee -a diagnostics/diagnostics.log
          python3 scripts/reporting/content_quality_report.py --mode summary --path wiki --failures-only 2>&1 | tee -a diagnostics/diagnostics.log
          quality_exit="${PIPESTATUS[0]}"

          echo "[CI-2] lint_wiki --strict" | tee -a diagnostics/diagnostics.log
          python3 scripts/kb/lint_wiki.py --wiki-root wiki --strict 2>&1 | tee -a diagnostics/diagnostics.log
          lint_exit="${PIPESTATUS[0]}"

          echo "[CI-2] pytest" | tee -a diagnostics/diagnostics.log
          python3 -m pytest tests/ -q 2>&1 | tee -a diagnostics/diagnostics.log
          tests_exit="${PIPESTATUS[0]}"

          diagnostics_exit=0
          if [ "${wrapper_exit}" -ne 0 ] || [ "${freshness_exit}" -ne 0 ] || [ "${quality_exit}" -ne 0 ] || [ "${lint_exit}" -ne 0 ] || [ "${tests_exit}" -ne 0 ]; then
            diagnostics_exit=1
          fi

          echo "[CI-2] wrapper_exit=${wrapper_exit} freshness_exit=${freshness_exit} quality_exit=${quality_exit} lint_exit=${lint_exit} tests_exit=${tests_exit} diagnostics_exit=${diagnostics_exit}" | tee -a diagnostics/diagnostics.log
          echo "exit_code=${diagnostics_exit}" >> "${GITHUB_OUTPUT}"
          {
            echo "wrapper_exit=${wrapper_exit}"
            echo "freshness_exit=${freshness_exit}"
            echo "quality_exit=${quality_exit}"
            echo "lint_exit=${lint_exit}"
            echo "tests_exit=${tests_exit}"
          } >> "${GITHUB_OUTPUT}"
          exit 0

      - name: Upload diagnostics artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ci2-analyst-diagnostics-${{ github.run_id }}
          path: diagnostics/
          if-no-files-found: warn
          retention-days: 14

      - name: Fail explicitly when diagnostics fail
        if: steps.diagnostics.outputs.exit_code != '0'
        run: |
          set -euo pipefail
          [ "${{ steps.diagnostics.outputs.wrapper_exit }}" = "0" ] || echo "::error::validate_wiki_governance failed. FIX: run python3 .github/skills/validate-wiki-governance/logic/validate_wiki_governance.py --quiet locally to see failures."
          [ "${{ steps.diagnostics.outputs.freshness_exit }}" = "0" ] || echo "::error::check_doc_freshness failed. FIX: update the updated_at frontmatter field on stale pages. See diagnostics artifacts for which files."
          [ "${{ steps.diagnostics.outputs.quality_exit }}" = "0" ] || echo "::error::content_quality_report failed. FIX: add missing sources/updated_at fields or resolve placeholder markers in affected wiki pages."
          [ "${{ steps.diagnostics.outputs.lint_exit }}" = "0" ] || echo "::error::lint_wiki failed. FIX: run python3 scripts/kb/lint_wiki.py --wiki-root wiki --strict locally to see violations with remediation hints."
          [ "${{ steps.diagnostics.outputs.tests_exit }}" = "0" ] || echo "::error::pytest failed. FIX: run python3 -m pytest tests/ -q locally to see failures."
          exit 1

  lint-workflows:
    name: CI-2 workflow lint (actionlint)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository snapshot
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Run actionlint
        uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8 # v2
        with:
          files: ".github/workflows/*.yml"
